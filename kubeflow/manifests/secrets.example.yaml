# Copy to secrets.yaml, fill in real values, then `make secrets`.
# secrets.yaml is gitignored.
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: worldbank
  annotations:
    # Consumed by KServe's storage-initializer to pull the model from S3.
    serving.kserve.io/s3-endpoint: s3.amazonaws.com
    serving.kserve.io/s3-usehttps: "1"
    serving.kserve.io/s3-region: us-east-1
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
---
# ServiceAccount KServe uses so the storage-initializer picks up the S3 secret.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kserve-s3-sa
  namespace: worldbank
secrets:
  - name: aws-credentials
---
# KFP runs pipeline pods in the `kubeflow` namespace, so the steps need the same
# creds there. (No KServe annotations needed here.)
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: kubeflow
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
---
# MLflow Postgres credentials. MUST be named "mlflow-postgresql" (the name the
# MLflow deployment references) and live in the same namespace as MLflow.
# `postgres-password` = admin (postgres user), `password` = the mlflow user.
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-postgresql
  namespace: worldbank
type: Opaque
stringData:
  postgres-password: "REPLACE_ME"
  password: "REPLACE_ME"
---
# Grafana admin credentials, read by kube-prometheus-stack's grafana subchart.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "REPLACE_ME"
